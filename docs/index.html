<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Browser-based post-production toolkit for indie filmmakers."
    />
    <title>Cinematheca</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #161412;
        color: #f4efe7;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(680px, calc(100% - 48px));
        border: 1px solid #4b4238;
        border-radius: 8px;
        padding: 32px;
        background: #211d19;
      }

      a {
        color: #f0b35b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Cinematheca</h1>
      <p>Independent cinema post-production, running locally in the browser.</p>
      <p>
        Repository:
        <a href="https://github.com/baditaflorin/cinematheca"
          >https://github.com/baditaflorin/cinematheca</a
        >
      </p>
      <p>
        Support:
        <a href="https://www.paypal.com/paypalme/florinbadita"
          >https://www.paypal.com/paypalme/florinbadita</a
        >
      </p>
    </main>
  </body>
</html>
